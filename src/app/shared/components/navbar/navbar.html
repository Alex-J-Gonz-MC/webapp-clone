<nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold fs-4" routerLink="/restaurants">
      🍔 FoodApp
    </a>

    <div class="d-flex align-items-center gap-2">
      <!-- Cart button -->
      <button
        class="btn btn-outline-light position-relative me-1"
        (click)="cartService.toggleDrawer()"
        title="Cart"
      >
        <i class="bi bi-cart3 fs-5"></i>
        @if (cartService.itemCount() > 0) {
          <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
            {{ cartService.itemCount() }}
          </span>
        }
      </button>

      <!-- Account menu -->
      @if (authService.isLoggedIn()) {
        <div ngbDropdown placement="bottom-end">
          <button class="btn btn-outline-light" ngbDropdownToggle>
            <i class="bi bi-person-circle me-1"></i>
            {{ authService.currentUser()?.firstName }}
          </button>
          <div ngbDropdownMenu>
            <a ngbDropdownItem routerLink="/account/profile">
              <i class="bi bi-person me-2"></i>Profile
            </a>
            <a ngbDropdownItem routerLink="/account/order-history">
              <i class="bi bi-bag me-2"></i>Orders
            </a>
            <a ngbDropdownItem routerLink="/account/addresses">
              <i class="bi bi-geo-alt me-2"></i>Addresses
            </a>
            <div class="dropdown-divider"></div>
            <button ngbDropdownItem (click)="logout()">
              <i class="bi bi-box-arrow-right me-2"></i>Logout
            </button>
          </div>
        </div>
      } @else {
        <a class="btn btn-outline-light" routerLink="/login">Login</a>
      }
    </div>
  </div>
</nav>
